<header class="navbar sticky-top bg-dark flex-md-nowrap p-0 shadow" data-bs-theme="dark">

<div class="container-fluid">
  <div class="row">
    <main class="col-md-12 ms-sm-auto col-lg-12 px-md-4" id="main">
      <h1 style="margin-top:1px;"></h1>
      <h1 style="margin-top:1px;" id="mainTitle"></h1>
    </main>
  </div>
</div>
<script src="https://getbootstrap.com/docs/5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
  const party_map = new Map();
  // 2026
  party_map.set('미개표', '0')
  party_map.set('예측 전', '0')

  party_map.set('더불어민주당', '1')
  party_map.set('국민의힘', '2')
  party_map.set('조국혁신당', '3')
  party_map.set('개혁신당', '4')
  
  kcities = ["서울", "경기", "인천", "강원", "대전", "세종", "충남", "충북", "부산", "울산", "경남", "대구", "경북", "전남광주", "전북", "제주"]

  const prettyPercentage = function (a) {
      if(a >= 0){
          p = Math.round(a * 1000);
          return Math.floor(p / 10) + "." + (p%10);
      }else{
          p = Math.round((-a) * 1000);
          return "-" + Math.floor(p / 10) + "." + (p%10);
      }
  }

  async function loadSequential(files) {
    const results = [];

    for (const f of files) {
      try {
        const data = await $.ajax({ url: `recent/all_${f}.txt?v=${Date.now()}`, dataType: "text"});
        results.push({ name: f, status: "fulfilled", value: data });
      } catch (err) {
        results.push({ name: f, status: "rejected", reason: err });
      }
    }
    return results;
  }

  loadSequential(kcities).then(results => {
    contents = '';
    const mainFrame = $("#main");
    for(const r of results) {
      if(r.status === "fulfilled") {
        const lines = r.value.trim().split("\r\n");
        let first = -1, second = -1;
        let firstn = -1, secondn = -1;
        let cnt = 0;
        for(const l of lines) {
          tokens = l.split("\t");
          if(cnt == 0){
            all_0 = Number(tokens[0]);
            all_1 = Number(tokens[1]);
            open_0 = Number(tokens[2]);
            open_1 = Number(tokens[3]);
            valid_0 = Number(tokens[4]);
            valid_1 = Number(tokens[5]);
            all_sum = all_0 + all_1;
            open_sum = open_0 + open_1;
            valid_sum = valid_0 + valid_1;
          }else{
            let candn = Number(tokens[2]);
            if(candn > firstn){
              second = first;
              secondn = firstn;
              first = cnt;
              firstn = candn;
            }else if(candn > secondn){
              second = cnt;
              secondn = candn;
            }
          }
          cnt += 1;
        }
        first_tokens = lines[first].split("\t");
        second_tokens = lines[second].split("\t");
        first_party = party_map.get(first_tokens[0]) ?? 1557;
        second_party = party_map.get(second_tokens[0]) ?? 1557;
        first_0 = Number(first_tokens[3])
        second_0 = Number(second_tokens[3])
        first_1 = Number(first_tokens[4])
        second_1 = Number(second_tokens[4])
        const TBA = 35.0;
        const ui_first = 4, ui_second = 6, target_city = r.name, pred_msg = "1위 확률";
        contents += `
          <div class="col-xxl-${ui_first} col-xl-${ui_second} col-lg-${ui_second}  col-md-12 col-sm-12 col-xs-12 accordion" id="accordionExample">
          <div class="accordion-item">
            <h2 class="accordion-header">
              <button class="accordion-button no${(firstn > 0) ? first_party : 0}" type="button" aria-expanded="true">
                ${target_city} | 개표 ${prettyPercentage(open_sum / (all_sum + 1e-6))}% (사전 - ${prettyPercentage(open_0 / (all_0 + 1e-6))}%, 선거일 - ${prettyPercentage(open_1 / (all_1 + 1e-6))}%)&nbsp;
              </button>
            </h2>
            <div class="accordion-collapse collapse show">
              <div class="accordion-body">
                <div class="row">
                  <div class="col-6 tno${first_party}">
                    <h5 style="text-align:left;">${first_tokens[0]}</h5>
                    <h2 style="text-align:left;">${first_tokens[1]}</h2>
                    <h2 style="text-align:left;">${prettyPercentage(firstn / (valid_sum + 1e-6))}%</h2>
                  </div>
                  <div class="col-6 tno${second_party}">
                    <h5 style="text-align:right;">${second_tokens[0]}</h5>
                    <h2 style="text-align:right;">${second_tokens[1]}</h2>
                    <h2 style="text-align:right;">${prettyPercentage(secondn / (valid_sum + 1e-6))}%</h2>
                  </div>                
                </div>
                <div class="row">
                  <div class="col-6 tno${first_party}">
                    <h5 style="text-align:left;">예측 ${first_tokens[6]}-${first_tokens[7]}%</h5>
                  </div>
                  <div class="col-6 tno${second_party}">
                    <h5 style="text-align:right;">예측 ${second_tokens[6]}-${second_tokens[7]}%</h5>
                  </div>                
                </div>
                <div class="progress-stacked">
                  <div class="progress" role="progressbar" style="width: ${prettyPercentage(firstn / (open_sum + 1e-6))}%">
                    <div class="progress-bar no${first_party}"></div>
                  </div>
                  <div class="progress" role="progressbar" style="width: ${100 - prettyPercentage((firstn + secondn) / (open_sum + 1e-6))}%">
                    <div class="progress-bar no0"></div>
                  </div>
                  <div class="progress" role="progressbar" style="width: ${prettyPercentage(secondn / (open_sum + 1e-6))}%">
                    <div class="progress-bar no${second_party}"></div>
                  </div>
                </div>
                <hr>
                <div class="row">
                  <div class="col-5" style="height:60px;">
                    <h4 style="text-align:center">사전 (${prettyPercentage(all_0 / (all_sum + 1e-6))}%)</h4>
                    <h5 style="text-align:center;margin-top:-7px;">${prettyPercentage(first_0 / (valid_0 + 1e-6))} | ${prettyPercentage(second_0 / (valid_0 + 1e-6))}</h5>
                  </div>
                  <div class="col-7">
                    <div class="progress-stacked" style="margin-top:20px;">
                      <div class="progress" role="progressbar" style="width: ${prettyPercentage(first_0 / (valid_0 + 1e-6))}%">
                        <div class="progress-bar no${first_party}"></div>
                      </div>
                      <div class="progress" role="progressbar" style="width: ${100.0 - prettyPercentage((first_0 + second_0) / (valid_0 + 1e-6))}%">
                        <div class="progress-bar no0"></div>
                      </div>
                      <div class="progress" role="progressbar" style="width: ${prettyPercentage(second_0 / (valid_0 + 1e-6))}%">
                        <div class="progress-bar no${second_party}"></div>
                      </div>
                    </div>
                  </div>
                  <div class="col-5" style="height:60px;">
                    <h4 style="text-align:center">선거일 (${prettyPercentage(all_1 / (all_sum + 1e-6))}%)</h4>
                    <h5 style="text-align:center;margin-top:-7px;">${prettyPercentage(first_1 / (valid_1 + 1e-6))} | ${prettyPercentage(second_1 / (valid_1 + 1e-6))}</h5>
                  </div>
                  <div class="col-7">
                    <div class="progress-stacked" style="margin-top:20px;">
                      <div class="progress" role="progressbar" style="width: ${prettyPercentage(first_1 / (valid_1 + 1e-6))}%">
                        <div class="progress-bar no${first_party}"></div>
                      </div>
                      <div class="progress" role="progressbar" style="width: ${100.0 - prettyPercentage((first_1 + second_1) / (valid_1 + 1e-6))}%">
                        <div class="progress-bar no0"></div>
                      </div>
                      <div class="progress" role="progressbar" style="width: ${prettyPercentage(second_1 / (valid_1 + 1e-6))}%">
                        <div class="progress-bar no${second_party}"></div>
                      </div>
                    </div>
                  </div>
                  <div class="col-5" style="height:60px;">
                    <h4 style="text-align:center">예측 당선 확률</h4>
                    <h5 style="text-align:center;margin-top:-7px;">${first_tokens[5]} | ${second_tokens[5]}</h5>
                  </div>
                  <div class="col-7">
                    <div class="progress-stacked" style="margin-top:20px;">
                      <div class="progress" role="progressbar" style="width: ${first_tokens[5]}%">
                        <div class="progress-bar no${first_party}"></div>
                      </div>
                      <div class="progress" role="progressbar" style="width: ${100.0 - parseFloat(first_tokens[5]) - parseFloat(second_tokens[5])}%">
                        <div class="progress-bar no0"></div>
                      </div>
                      <div class="progress" role="progressbar" style="width: ${second_tokens[5]}%">
                        <div class="progress-bar no${second_party}"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        `
      }
    }
    mainFrame.append(`
    <div class="row">
      ${contents}
    </div>
    `);
  });
</script>
